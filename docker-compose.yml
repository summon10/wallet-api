services:
  postgres:
    image: 'postgres:latest'
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data/18

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wallet-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:8080"

volumes:
    postgres-data: